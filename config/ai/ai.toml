# AI Tools Configuration
# ========================
# Enable/disable individual AI tools for this dotfiles installation.
#
# IMPORTANT: This is the REPO DEFAULT config.
# To customize, copy to ~/.config/dotfiles/ai.toml and edit there.
# Local config takes priority over this file.
#
# Priority (highest to lowest):
# 1. Environment variables: DOTFILES_AI_<TOOL>=1
# 2. Local config: ~/.config/dotfiles/ai.toml
# 3. This file (repo default)
#
# Values: true/false, 1/0, yes/no
#
# Example environment override:
#   export DOTFILES_AI_COPILOT=1
#   export DOTFILES_AI_OPENCODE=true

[dotfiles]
# Example: profile = "core" uses config/packages/brew.core
profile = ""

[tools]
# GitHub Copilot - AI pair programmer
# Packages: npm:@github/copilot, npm:@github/copilot-language-server
# Neovim: copilot.lua plugin
copilot = false

# OpenCode - AI coding assistant CLI
# Packages: opencode (mise)
opencode = false

# CodeCompanion - Neovim AI plugin
# Packages: none (Neovim plugin only)
# Neovim: codecompanion.nvim plugin
codecompanion = false

# WakaTime - Coding activity tracker
# Packages: none (plugins only)
# Neovim: vim-wakatime plugin
# Zsh: zsh-wakatime plugin
wakatime = false
