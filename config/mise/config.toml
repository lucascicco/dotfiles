[settings]
experimental = true
cache_prune_age = "7d"
idiomatic_version_file_enable_tools = [
    "python",
    "node",
    "go",
    "terraform",
    "terragrunt",
    "opentofu",
]

[settings.pipx]
uvx = true

[settings.python]
uv_venv_auto = true

[settings.npm]
bun = true

[env]
OPENCODE_EXPERIMENTAL_ICON_DISCOVERY = "true"
OPENCODE_EXPERIMENTAL_FILEWATCHER = "true"

[tools]
# tools
actionlint = 'latest'
argocd = 'latest'
ast-grep = 'latest'
awscli = 'latest'
biome = 'latest'
bottom = 'latest'
cheat = 'latest'
cloud-sql-proxy = 'latest'
cmctl = 'latest'
delta = 'latest'
doctl = 'latest'
duf = 'latest'
fd = 'latest'
fzf = 'latest'
jq = 'latest'
glab = 'latest'
gcloud = 'latest'
github-cli = 'latest'
gomplate = 'latest'
helm = 'latest'
helm-diff = 'latest'
helm-docs = 'latest'

# Kubernetes tools
