[user]
    signingkey = 316B5072CC4BD298
    name = Lucas Cicco
    email = lucasvitorx1@gmail.com

[fetch]
    prune = true

[color]
    ui = always

[core]
    pager = nvim
    excludesfile = ~/.gitignore
    attributesfile = ~/.gitattributes

[diff]
    tool = meld
    noprefix = true

[interactive]
    diffFilter = delta --color-only

[init]
    defaultBranch = main

[delta]
    navigate = true
    dark = true

[merge]
    tool = nvim
    conflictStyle = zdiff3

[pull]
    ff = only

[commit]
    gpgsign = true

[alias]
    aa = git add -A
    co = checkout
    br = branch
    ci = commit
    cim = commit -am
    st = status
    di = diff
    sdi = diff --cached
    ndi = diff --color=never
    nsdi = diff --cached --color=never
    fe = fetch --all
    rom = rebase -i origin/master
