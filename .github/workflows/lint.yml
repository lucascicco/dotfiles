name: lint

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: ./scripts
          additional_files: "config/bash/rc.sh config/bash/rc_darwin.sh config/bash/rc_linux.sh"
